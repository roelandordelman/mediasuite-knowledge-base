# mediasuite-knowledge-base configuration

source:
  repo_path: /tmp/mediasuite-website

output:
  knowledge_base_json: knowledge_base.json

chunking:
  target_chars: 800
  overlap_chars: 150

embedding:
  model: nomic-embed-text
  batch_size: 64

vector_store:
  collection_name: mediasuite
  chroma_host: localhost
  chroma_port: 8001

# Media Suite tool names used for structured filtering
known_tools:
  - Collection Inspector
  - Workspace
  - Search Tool
  - Compare Tool
  - Explore Tool
  - Resource Viewer
  - Annotation Tool
  - Statistical Analysis
  - Bookmarking
  - User Project
  - Data Stories
  - Timeline
  - Word Cloud
  - Fragment Cutter
  - Speech Recognition
  - Computer Vision
  - Similarity Tool
  - FactRank Tool
  - Reflexivity Tool

# Media Suite data collection names used for structured filtering
known_collections:
  - Sound & Vision Archive
  - Sound & Vision Radio Archive
  - Sound & Vision Television Archive
  - DANS Oral History Archive
  - Radio Oranje
  - Open Beelden
  - KB Newspaper Collection
  - EYE Film Collection
  - Tweede Kamer Archive
  - Meertens Soundbites Collection
  - Amateur Film Collection
  - Dutch Program Guides
  - Kijk & Luistercijfers
  - NISV Art Collection
  - Open Beelden Natuurbeelden

# Tool→entity URI and TaDiRaH activity mappings for Phase 4 knowledge graph.
# Supplements known_tools (flat list used for keyword extraction — pipelines unchanged).
# Graph-building tooling reads this block to attach entity_uri and activity links to chunks.
# Notes explain cases where a known_tools entry is not a standalone entity in the graph.
tool_entities:
  "Search Tool":
    entity_uri: "https://mediasuite.clariah.nl/vocab#SearchTool"
    entity_type: "ComponentTool"
    tadirah_activities:
      - "https://vocabs.dariah.eu/tadirah/searching"
      - "https://vocabs.dariah.eu/tadirah/querying"
      - "https://vocabs.dariah.eu/tadirah/dataVisualization"
      - "https://roelandordelman.github.io/mediasuite-knowledge-base/vocab#Sampling"
  "Collection Inspector":
    entity_uri: "https://mediasuite.clariah.nl/vocab#CollectionInspector"
    entity_type: "ComponentTool"
    tadirah_activities:
      - "https://vocabs.dariah.eu/tadirah/browsing"
      - "https://vocabs.dariah.eu/tadirah/exploration"
      - "https://vocabs.dariah.eu/tadirah/dataVisualization"
      - "https://vocabs.dariah.eu/tadirah/qualityAssurance"
  "Explore Tool":
    entity_uri: "https://mediasuite.clariah.nl/vocab#ExploreTool"
    entity_type: "ComponentTool"
    tadirah_activities:
      - "https://vocabs.dariah.eu/tadirah/browsing"
      - "https://vocabs.dariah.eu/tadirah/exploration"
      - "https://vocabs.dariah.eu/tadirah/linkedOpenData"
  "Compare Tool":
    entity_uri: "https://mediasuite.clariah.nl/vocab#CompareTool"
    entity_type: "ComponentTool"
    tadirah_activities:
      - "https://vocabs.dariah.eu/tadirah/comparing"
      - "https://vocabs.dariah.eu/tadirah/dataVisualization"
  "Resource Viewer":
    entity_uri: "https://mediasuite.clariah.nl/vocab#ResourceViewer"
    entity_type: "ComponentTool"
    tadirah_activities:
      - "https://vocabs.dariah.eu/tadirah/browsing"
      - "https://vocabs.dariah.eu/tadirah/segmenting"
      - "https://vocabs.dariah.eu/tadirah/visualAnnotation"
      - "https://vocabs.dariah.eu/tadirah/audioAnnotation"
  "Annotation Tool":
    entity_uri: "https://mediasuite.clariah.nl/vocab#AnnotationTool"
    entity_type: "ComponentTool"
    tadirah_activities:
      - "https://vocabs.dariah.eu/tadirah/visualAnnotation"
      - "https://vocabs.dariah.eu/tadirah/audioAnnotation"
      - "https://vocabs.dariah.eu/tadirah/segmenting"
  "Workspace":
    entity_uri: "https://mediasuite.clariah.nl/vocab#Workspace"
    entity_type: "ComponentTool"
    tadirah_activities:
      - "https://vocabs.dariah.eu/tadirah/collecting"
      - "https://vocabs.dariah.eu/tadirah/managing"
      - "https://roelandordelman.github.io/mediasuite-knowledge-base/vocab#Sampling"
  "Bookmarking":
    entity_uri: "https://mediasuite.clariah.nl/vocab#Workspace"
    entity_type: "ComponentTool"
    note: "Bookmarking is a functionality within Workspace; no separate entity URI."
    tadirah_activities:
      - "https://vocabs.dariah.eu/tadirah/collecting"
  "User Project":
    entity_uri: "https://mediasuite.clariah.nl/vocab#Workspace"
    entity_type: "ComponentTool"
    note: "User Project is a functionality within Workspace; no separate entity URI."
    tadirah_activities:
      - "https://vocabs.dariah.eu/tadirah/collecting"
      - "https://vocabs.dariah.eu/tadirah/managing"
  "Statistical Analysis":
    entity_uri: "https://mediasuite.clariah.nl/vocab#StatisticalAnalysis"
    entity_type: "ComponentTool"
    tadirah_activities:
      - "https://vocabs.dariah.eu/tadirah/dataVisualization"
      - "https://vocabs.dariah.eu/tadirah/dataMining"
  "Fragment Cutter":
    entity_uri: "https://mediasuite.clariah.nl/vocab#FragmentCutter"
    entity_type: "ComponentTool"
    tadirah_activities:
      - "https://vocabs.dariah.eu/tadirah/segmenting"
      - "https://vocabs.dariah.eu/tadirah/videoEditing"
  "Computer Vision":
    entity_uri: "https://mediasuite.clariah.nl/vocab#SimilarityTool"
    entity_type: "ComponentTool"
    note: "Alternate name for the Similarity Tool (ms:SimilarityTool)."
    tadirah_activities:
      - "https://vocabs.dariah.eu/tadirah/patternRecognition"
      - "https://vocabs.dariah.eu/tadirah/informationRetrieval"
  "FactRank Tool":
    entity_uri: "https://mediasuite.clariah.nl/vocab#FactRankTool"
    entity_type: "ComponentTool"
    tadirah_activities:
      - "https://vocabs.dariah.eu/tadirah/informationRetrieval"
      - "https://vocabs.dariah.eu/tadirah/discourseAnalysis"
  "Reflexivity Tool":
    entity_uri: "https://mediasuite.clariah.nl/vocab#ReflexivityTool"
    entity_type: "ComponentTool"
    tadirah_activities:
      - "https://vocabs.dariah.eu/tadirah/defining"
  "Speech Recognition":
    entity_uri: "https://mediasuite.clariah.nl/vocab#ASRService"
    entity_type: "InfrastructureService"
    note: "Backend service (ms:ASRService), not a ComponentTool. In known_tools for keyword extraction."
    tadirah_activities:
      - "https://vocabs.dariah.eu/tadirah/speechRecognizing"
  "Data Stories":
    entity_uri: "https://mediasuite.clariah.nl/vocab#DataStory"
    entity_type: "DataProduct"
    note: "Data Stories is a publication format (ms:DataStory data product), not a ComponentTool."
    tadirah_activities: []
  "Timeline":
    entity_uri: "https://mediasuite.clariah.nl/vocab#ResourceViewer"
    entity_type: "ComponentTool"
    note: "Timeline is the zoomable timeline within the Resource Viewer, not a standalone entity."
    tadirah_activities:
      - "https://vocabs.dariah.eu/tadirah/dataVisualization"
  "Word Cloud":
    entity_uri: "https://mediasuite.clariah.nl/vocab#StatisticalAnalysis"
    entity_type: "ComponentTool"
    note: "Word Cloud is a visualization option within Statistical Analysis / Compare Tool, not a standalone entity."
    tadirah_activities:
      - "https://vocabs.dariah.eu/tadirah/dataVisualization"

publications:
  output: "publications.json"
  cache_dir: "/tmp/publications_cache"
  zotero_group_id: "2288915"
  openalex_email: "roeland.ordelman@pm.me"
  generation_model: "mistral"
  # Paper types to include (paratext, libguides, other excluded)
  types_include:
    - article
    - book-chapter
    - report
    - preprint
    - dissertation
    - book
  # DOIs to always include regardless of Zotero membership.
  # Use this for high-relevance papers not yet added to the Zotero group.
  supplementary_dois:
    - "10.18146/tmg.810"         # CrossEWT — WW2 eyewitness testimonies
    - "10.18146/tmg.811"         # MIMEHIST — annotation of Jean Desmet Collection
    - "10.18146/tmg.813"         # Comparative Search in Newspaper and AV Archives
    - "10.5281/zenodo.12517693"  # CLARIAH Media Suite: from 2014 to 2024 (brochure/report)
    - "10.5281/zenodo.10691620"  # Requirement analysis — Viewing and Listening Rates use case
    - "10.5281/zenodo.7624998"   # Moving Beyond Tool-Oriented Teaching (DH Benelux 2022 paper)
    - "10.5281/zenodo.18712971"  # CLARIAH Media Suite Workshop: ASR (lecturer manual + handout)
    - "10.5281/zenodo.18712838"  # CLARIAH Media Suite Workshop: Zoeken en/in Metadata

data_stories:
  repo_path: /tmp/data-stories
  output: "data_stories.json"
  url_prefix: "https://mediasuitedatastories.clariah.nl"
  content_type: "Data Story"
  skip_slugs:
    - mediaoorlog  # Dutch-only story

community_site:
  repo_path: /tmp/media-suite-community
  output: "community.json"
  base_url: "https://roelandordelman.github.io/media-suite-community"
  pages:
    - file: sane.md
      content_type: "SANE Documentation"
  collections:
    _sane-collections:
      content_type: "SANE Documentation"
      url_prefix: "https://roelandordelman.github.io/media-suite-community/sane/collections"
  # Override chunk title prefixes to bridge acronym vocabulary gaps
  title_overrides:
    sane: "SANE — Secure Analysis Environment for Sensitive Audiovisual Research Data"

data_platform:
  repo_path: /tmp/data.beeldengeluid.nl
  output: "data_platform.json"
  collections:
    datasets:
      content_type: "Collection Documentation"
      url_prefix: "https://data.beeldengeluid.nl/datasets"
    apis:
      content_type: "API Documentation"
      url_prefix: "https://data.beeldengeluid.nl/apis"
  # Override context-prefix titles for pages with Dutch-dominant titles
  # to improve retrieval for English queries.
  title_overrides:
    muziekopnamen-zendgemachtigden: "MOZ collection — Music Recordings (Muziekopnamen Zendgemachtigden)"

# Override the [Title] context prefix in chunk text, keyed by URL slug.
# Use when the page title uses different vocabulary than researchers would use
# in queries (e.g. tool has a branded name but researchers search by concept).
chunk_title_overrides:
  similarity: "Similarity Tool — Computer Vision Visual Similarity Search for Video (VisXP)"

graph:
  fuseki_url: "http://localhost:3030"
  dataset: "mediasuite"
  named_graph: "https://mediasuite.clariah.nl/graph"
  admin_user: "admin"
  admin_password: "admin"
  turtle_files:
    - "vocab/clariah-vocab.ttl"
    - "vocab/mediasuite-entities.ttl"
    - "vocab/mediasuite-collections.ttl"
    - "vocab/mediasuite-workflows.ttl"

  # Collection name → entity URI (mirrors known_collections + mediasuite-collections.ttl)
  collection_entities:
    "Sound & Vision Archive":            "https://mediasuite.clariah.nl/vocab#NISVArchive"
    "Sound & Vision Radio Archive":      "https://mediasuite.clariah.nl/vocab#SoundVisionRadioArchive"
    "Sound & Vision Television Archive": "https://mediasuite.clariah.nl/vocab#SoundVisionTelevisionArchive"
    "DANS Oral History Archive":         "https://mediasuite.clariah.nl/vocab#DANSOralHistory"
    "Radio Oranje":                      "https://mediasuite.clariah.nl/vocab#RadioOranje"
    "Open Beelden":                      "https://mediasuite.clariah.nl/vocab#OpenBeelden"
    "KB Newspaper Collection":           "https://mediasuite.clariah.nl/vocab#KBNewspapers"
    "EYE Film Collection":               "https://mediasuite.clariah.nl/vocab#EYEFilmCollection"
    "Tweede Kamer Archive":              "https://mediasuite.clariah.nl/vocab#TweedeKamerArchive"
    "Meertens Soundbites Collection":    "https://mediasuite.clariah.nl/vocab#MeertensDialectDB"
    "Amateur Film Collection":           "https://mediasuite.clariah.nl/vocab#AmateurFilmCollection"
    "Dutch Program Guides":              "https://mediasuite.clariah.nl/vocab#DutchProgramGuides"
    "Kijk & Luistercijfers":             "https://mediasuite.clariah.nl/vocab#KijkLuistercijfers"
    "NISV Art Collection":               "https://mediasuite.clariah.nl/vocab#NISVArtCollection"
    "Open Beelden Natuurbeelden":        "https://mediasuite.clariah.nl/vocab#Natuurbeelden"

  # URL substring → entity URI for tool/collection pages where the URL is
  # a more reliable signal than tools_mentioned (e.g. howto pages that describe
  # one tool but mention several). Matched in order; first match wins.
  url_entity_map:
    "howtos/search":                     "https://mediasuite.clariah.nl/vocab#SearchTool"
    "howtos/annotate":                   "https://mediasuite.clariah.nl/vocab#AnnotationTool"
    "howtos/compare-queries":            "https://mediasuite.clariah.nl/vocab#CompareTool"
    "howtos/inspect-collections":        "https://mediasuite.clariah.nl/vocab#CollectionInspector"
    "howtos/explore":                    "https://mediasuite.clariah.nl/vocab#ExploreTool"
    "howtos/view-resources":             "https://mediasuite.clariah.nl/vocab#ResourceViewer"
    "howtos/bookmark":                   "https://mediasuite.clariah.nl/vocab#Workspace"
    "howtos/similarity":                 "https://mediasuite.clariah.nl/vocab#SimilarityTool"
    "labo/documentation/similarity":     "https://mediasuite.clariah.nl/vocab#SimilarityTool"
    "labo/documentation/factrank":       "https://mediasuite.clariah.nl/vocab#FactRankTool"
    "datasets/open-beelden-natuurbeelden": "https://mediasuite.clariah.nl/vocab#Natuurbeelden"
    "datasets/open-beelden":             "https://mediasuite.clariah.nl/vocab#OpenBeelden"
    "datasets/radio-oranje":             "https://mediasuite.clariah.nl/vocab#RadioOranje"
    "datasets/nisv-media-catalog":       "https://mediasuite.clariah.nl/vocab#NISVArchive"
    "datasets/dans-oral-history":        "https://mediasuite.clariah.nl/vocab#DANSOralHistory"
    "apis/nisv-media-catalog":           "https://mediasuite.clariah.nl/vocab#SoundVisionSPARQL"
    "apis/open-images":                  "https://mediasuite.clariah.nl/vocab#OpenImagesAPI"
    "sane/collections":                  "https://mediasuite.clariah.nl/vocab#NISVArchive"
    "media-suite-community/sane":        "https://sane.surf.nl/"

