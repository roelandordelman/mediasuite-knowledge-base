# mediasuite-knowledge-base configuration

source:
  repo_path: /tmp/mediasuite-website

output:
  knowledge_base_json: knowledge_base.json

chunking:
  target_chars: 800
  overlap_chars: 150

embedding:
  model: nomic-embed-text
  batch_size: 64

vector_store:
  collection_name: mediasuite
  chroma_host: localhost
  chroma_port: 8001

# Media Suite tool names used for structured filtering
known_tools:
  - Collection Inspector
  - Workspace
  - Search Tool
  - Compare Tool
  - Explore Tool
  - Resource Viewer
  - Annotation Tool
  - Statistical Analysis
  - Bookmarking
  - User Project
  - Data Stories
  - Timeline
  - Word Cloud
  - Fragment Cutter
  - Speech Recognition
  - Computer Vision
  - FactRank Tool
  - Reflexivity Tool

# Media Suite data collection names used for structured filtering
known_collections:
  - Sound & Vision Archive
  - Sound & Vision Radio Archive
  - Sound & Vision Television Archive
  - DANS Oral History Archive
  - Radio Oranje
  - Open Beelden
  - KB Newspaper Collection
  - EYE Film Collection
  - Tweede Kamer Archive
  - Meertens Soundbites Collection
  - Amateur Film Collection
  - Dutch Program Guides
  - Kijk & Luistercijfers
  - NISV Art Collection
  - Open Beelden Natuurbeelden

publications:
  output: "publications.json"
  cache_dir: "/tmp/publications_cache"
  zotero_group_id: "2288915"
  openalex_email: "roeland.ordelman@pm.me"
  generation_model: "mistral"
  # Paper types to include (paratext, libguides, other excluded)
  types_include:
    - article
    - book-chapter
    - report
    - preprint
    - dissertation
    - book
  # DOIs to always include regardless of Zotero membership.
  # Use this for high-relevance papers not yet added to the Zotero group.
  supplementary_dois:
    - "10.18146/tmg.810"         # CrossEWT — WW2 eyewitness testimonies
    - "10.18146/tmg.811"         # MIMEHIST — annotation of Jean Desmet Collection
    - "10.18146/tmg.813"         # Comparative Search in Newspaper and AV Archives
    - "10.5281/zenodo.12517693"  # CLARIAH Media Suite: from 2014 to 2024 (brochure/report)
    - "10.5281/zenodo.10691620"  # Requirement analysis — Viewing and Listening Rates use case
    - "10.5281/zenodo.7624998"   # Moving Beyond Tool-Oriented Teaching (DH Benelux 2022 paper)
    - "10.5281/zenodo.18712971"  # CLARIAH Media Suite Workshop: ASR (lecturer manual + handout)
    - "10.5281/zenodo.18712838"  # CLARIAH Media Suite Workshop: Zoeken en/in Metadata

data_platform:
  repo_path: /tmp/data.beeldengeluid.nl
  output: "data_platform.json"
  collections:
    datasets:
      content_type: "Collection Documentation"
      url_prefix: "https://data.beeldengeluid.nl/datasets"
    apis:
      content_type: "API Documentation"
      url_prefix: "https://data.beeldengeluid.nl/apis"
  # Override context-prefix titles for pages with Dutch-dominant titles
  # to improve retrieval for English queries.
  title_overrides:
    muziekopnamen-zendgemachtigden: "MOZ collection — Music Recordings (Muziekopnamen Zendgemachtigden)"

collections:
  _help:
    content_type: "Help / Documentation"
    url_prefix: "https://mediasuite.clariah.nl/documentation"
    include: true
  _howtos:
    content_type: "How-to Guide"
    url_prefix: "https://mediasuite.clariah.nl/documentation/howtos"
    include: true
  _faq:
    content_type: "FAQ"
    url_prefix: "https://mediasuite.clariah.nl/documentation/faq"
    include: true
  _glossary:
    content_type: "Glossary"
    url_prefix: "https://mediasuite.clariah.nl/documentation/glossary"
    include: true
  _learn_main:
    content_type: "Learn (General)"
    url_prefix: "https://mediasuite.clariah.nl/learn"
    include: true
  _learn_tutorials_tool:
    content_type: "Tool Tutorial"
    url_prefix: "https://mediasuite.clariah.nl/learn/tool-tutorials"
    include: true
  _learn_tutorials_subject:
    content_type: "Subject Tutorial"
    url_prefix: "https://mediasuite.clariah.nl/learn/subject-tutorials"
    include: true
  _learn_tool_criticism:
    content_type: "Tool Criticism"
    url_prefix: "https://mediasuite.clariah.nl/learn/tool-criticism"
    include: true
  _learn_example_projects:
    content_type: "Example Project"
    url_prefix: "https://mediasuite.clariah.nl/learn/example-projects"
    include: true
  _labo-help:
    content_type: "Labo Help"
    url_prefix: "https://mediasuite.clariah.nl/labo/documentation"
    include: true
  _release-notes:
    content_type: "Release Notes"
    url_prefix: "https://mediasuite.clariah.nl/documentation/release-notes"
    include: true
