      - https://doi.org/10.5281/zenodo.12517693
    notes: "Vector search path fails: nomic-embed-text embeds 'Similarity Tool' near generic Media Suite content because 'Similarity' is a common English word — the brand name doesn't embed near its documentation. Structural path (SPARQL entity_description → entity_uri filter) works correctly. Chatbot should route named-tool questions through the structural path, not pure vector search."

  - question: "How can I download my annotations?"
    category: partial
    expected_urls:
      - https://mediasuite.clariah.nl/learn/tool-tutorials/tutorial-sharing-media-suite-annotations-following-the-fair-principles
