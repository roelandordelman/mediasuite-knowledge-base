# Retrieval evaluation questions
#
# Each entry has:
#   question:      what a researcher would actually type
#   expected_urls: list of acceptable source URLs — PASS if any appears in top-k
#   notes:         optional — why this question is useful as a test case
#
# Add new questions here as the knowledge base grows.
# Run: python evaluate/eval_retrieval.py

questions:
  - question: "What kind of search operators can I use in the Media Suite?"
    expected_urls:
      - https://mediasuite.clariah.nl/documentation/howtos/search
    notes: Core search how-to

  - question: "How do I inspect collection metadata in the Media Suite?"
    expected_urls:
      - https://mediasuite.clariah.nl/documentation/howtos/inspect-collections
      - https://mediasuite.clariah.nl/labo/documentation/collection-inspector
    notes: Inspect tool — both pages acceptable. UI name "Collection Inspector" is a known harder variant that fails due to vocabulary mismatch (docs say "Inspect tool"); fix requires enriching chunk prefixes with UI tool names.

  - question: "How do I create an annotation?"
    expected_urls:
      - https://mediasuite.clariah.nl/documentation/howtos/annotate
      - https://mediasuite.clariah.nl/learn/tool-tutorials/tutorial-sharing-media-suite-annotations-following-the-fair-principles
      - https://mediasuite.clariah.nl/learn/subject-tutorials/tutorial-sharing-media-suite-annotations-following-the-fair-principles
      - https://mediasuite.clariah.nl/learn/subject-tutorials/tutorial-segmenting-and-annotating-sesamstraat
      - https://mediasuite.clariah.nl/learn/tool-tutorials/tutorial-segmenting-and-annotating-sesamstraat
    notes: How-to or any annotation tutorial acceptable. How-to ranks below tutorials for this query — known retrieval gap.

  - question: "What kind of data is available in the Media Suite?"
    expected_urls:
      - https://mediasuite.clariah.nl/documentation/faq/what-data
    notes: Should pull overview / help content about available datasets

  - question: "How do I save items to my user project?"
    expected_urls:
      - https://mediasuite.clariah.nl/documentation/howtos/bookmark
    notes: Workspace / bookmarking

  - question: "How do I compare search queries in the Media Suite?"
    expected_urls:
      - https://mediasuite.clariah.nl/labo/documentation/query-comparison
      - https://mediasuite.clariah.nl/documentation/howtos/compare-queries
    notes: Compare tool — both pages acceptable. "Can I compare two time periods?" is a known harder variant that ranks targets at #11/#17 due to "time periods" vs doc vocabulary "date intervals"; fix requires query expansion in the chatbot.

  - question: "What is automatic speech recognition in the Media Suite?"
    expected_urls:
      - https://mediasuite.clariah.nl/learn/tool-tutorials/tutorial-searching-and-analysing-automatic-speech-recognition-asr-transcripts-as-data-layer-in-television-collections
      - https://mediasuite.clariah.nl/learn/tool-tutorials/tutorial-searching-and-analysing-the-sound-and-vision-radio-collection-using-automatic-speech-recognition
    notes: ASR / Speech Recognition feature — two tutorials are acceptable sources
