      - https://mediasuite.clariah.nl/documentation/howtos/compare-queries
    notes: Compare tool — both pages acceptable. "Can I compare two time periods?" is a known harder variant that ranks targets at #11/#17 due to "time periods" vs doc vocabulary "date intervals"; fix requires query expansion in the chatbot.

  - question: "What is automatic speech recognition in the Media Suite?"
