# Retrieval evaluation questions
#
# Each entry has:
#   question:        what a researcher would actually type
#   category:        answerable | partial | gap | structural (see below)
#   expected_urls:   list of acceptable source URLs — PASS if any appears in top-k
#                    (answerable / partial / gap only)
#   expected_answer: ground-truth answer text for end-to-end answer evaluation
#                    (structural only — no single URL; answer comes from SPARQL)
#   notes:           optional — why this question is useful as a test case
#
# Categories:
#   answerable  content exists and URL is known; should PASS — a FAIL means fix retrieval
#   partial     content exists but spread across pages or answer is implicit; may FAIL
#   gap         content does not yet exist; should FAIL — an unexpected PASS is a warning
#   structural  answer comes from the knowledge graph (SPARQL), not vector search;
#               skipped by eval_retrieval.py (no URL to check); used by the chatbot
#               repo's end-to-end answer evaluator once the router is built
#
# Add new questions here as the knowledge base grows.
# Run: python evaluate/eval_retrieval.py

