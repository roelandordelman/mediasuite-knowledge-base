# Retrieval evaluation questions
#
# Each entry has:
#   question:      what a researcher would actually type
#   expected_urls: list of acceptable source URLs — PASS if any appears in top-k
#   notes:         optional — why this question is useful as a test case
#
# Add new questions here as the knowledge base grows.
# Run: python evaluate/eval_retrieval.py

questions:
  - question: "What kind of search operators can I use in the Media Suite?"
    expected_urls:
      - https://mediasuite.clariah.nl/documentation/howtos/search
    notes: Core search how-to

  - question: "How do I inspect collection metadata in the Media Suite?"
    expected_urls:
      - https://mediasuite.clariah.nl/documentation/howtos/inspect-collections
      - https://mediasuite.clariah.nl/labo/documentation/collection-inspector
    notes: Inspect tool — both pages acceptable. UI name "Collection Inspector" is a known harder variant that fails due to vocabulary mismatch (docs say "Inspect tool"); fix requires enriching chunk prefixes with UI tool names.

  - question: "How do I create an annotation?"
    expected_urls:
      - https://mediasuite.clariah.nl/documentation/howtos/annotate
      - https://mediasuite.clariah.nl/learn/tool-tutorials/tutorial-sharing-media-suite-annotations-following-the-fair-principles
      - https://mediasuite.clariah.nl/learn/subject-tutorials/tutorial-sharing-media-suite-annotations-following-the-fair-principles
      - https://mediasuite.clariah.nl/learn/subject-tutorials/tutorial-segmenting-and-annotating-sesamstraat
      - https://mediasuite.clariah.nl/learn/tool-tutorials/tutorial-segmenting-and-annotating-sesamstraat
    notes: How-to or any annotation tutorial acceptable. How-to ranks below tutorials for this query — known retrieval gap.

  - question: "What kind of data is available in the Media Suite?"
    expected_urls:
      - https://mediasuite.clariah.nl/documentation/faq/what-data
    notes: Should pull overview / help content about available datasets

  - question: "How do I save items to my user project?"
    expected_urls:
      - https://mediasuite.clariah.nl/documentation/howtos/bookmark
    notes: Workspace / bookmarking

  - question: "How do I compare search queries in the Media Suite?"
    expected_urls:
      - https://mediasuite.clariah.nl/labo/documentation/query-comparison
      - https://mediasuite.clariah.nl/documentation/howtos/compare-queries
    notes: Compare tool — both pages acceptable. "Can I compare two time periods?" is a known harder variant that ranks targets at #11/#17 due to "time periods" vs doc vocabulary "date intervals"; fix requires query expansion in the chatbot.

  - question: "What is automatic speech recognition in the Media Suite?"
    expected_urls:
      - https://mediasuite.clariah.nl/learn/tool-tutorials/tutorial-searching-and-analysing-automatic-speech-recognition-asr-transcripts-as-data-layer-in-television-collections
      - https://mediasuite.clariah.nl/learn/tool-tutorials/tutorial-searching-and-analysing-the-sound-and-vision-radio-collection-using-automatic-speech-recognition
    notes: ASR / Speech Recognition feature — two tutorials are acceptable sources

  - question: "How can I log into the Media Suite?"
    category: answerable
    expected_urls:
      - https://mediasuite.clariah.nl/documentation/faq/who-can-access
      - https://mediasuite.clariah.nl/documentation/howtos/login
      - https://mediasuite.clariah.nl/learn/tool-tutorials/logging-in-workspace-and-creating-a-user-project

  - question: "Can I download my annotations?"
    category: partial
    expected_urls:
      - https://mediasuite.clariah.nl/learn/tool-tutorials/tutorial-sharing-media-suite-annotations-following-the-fair-principles
      - https://mediasuite.clariah.nl/documentation/howtos/export

  - question: "What types of annotations does the Media Suite support?"
    category: answerable
    expected_urls:
      - https://mediasuite.clariah.nl/learn/tool-tutorials/tutorial-sharing-media-suite-annotations-following-the-fair-principles

  - question: "I cannot find my institution when I want to login, why is that?"
    category: answerable
    expected_urls:
      - https://mediasuite.clariah.nl/documentation/faq/who-can-access
      - https://mediasuite.clariah.nl/documentation/howtos/login

  - question: "How can I do quantitative analysis with Media Suite data with a Jupyter Notebook?"
    category: gap
    notes: Data stories document results of Jupyter-based research but don't teach how to set up a notebook; a how-to guide or tutorial is the missing content type here.

  - question: "Has the Media Suite been used for quantitative analysis of television news?"
    category: answerable
    expected_urls:
      - https://mediasuitedatastories.clariah.nl/covid-19/
      - https://mediasuitedatastories.clariah.nl/DWDD/
      - https://mediasuitedatastories.clariah.nl/elections-2021-first-results/
    notes: Data stories cover multiple quantitative TV news analyses; any of the above acceptable.

  - question: "Has the Media Suite been used to study gender representation in Dutch media?"
    category: answerable
    expected_urls:
      - https://mediasuitedatastories.clariah.nl/gender-research-intro/
    notes: Gender data story ranks #1-3 for this query.

  - question: "What does the FactRank tool do?"
    category: gap

  - question: "Why can I not view content?"
    category: partial
    expected_urls:
      - https://mediasuite.clariah.nl/documentation/troubleshooting
      - https://mediasuite.clariah.nl/documentation/faq/who-can-access

  - question: "How can I use SANE?"
    category: partial
    expected_urls:
      - https://roelandordelman.github.io/media-suite-community/sane/
    notes: Content is indexed but "SANE" embeds as the English adjective, not the acronym — ranks outside top 30. Descriptive variants ("work with sensitive audiovisual data in a secure environment") rank it #2. Fix requires query expansion in the chatbot.

  - question: "How do I work with sensitive audiovisual data in a secure environment?"
    category: answerable
    expected_urls:
      - https://roelandordelman.github.io/media-suite-community/sane/
    notes: Descriptive form of the SANE question — retrieves correctly at rank #2. Use this as the passing variant until chatbot adds query expansion.

  - question: "How can I use computer vision in the Media Suite?"
    category: answerable
    expected_urls:
      - https://mediasuite.clariah.nl/labo/documentation/similarity
      - https://doi.org/10.5281/zenodo.12517693
    notes: Similarity tool (VisXP) is the computer vision feature; vocabulary mismatch fixed via chunk_title_overrides in config.yaml

  - question: "Can I add my own data to the Media Suite?"
    category: gap

  - question: "Who develops the Media Suite?"
    category: partial
    expected_urls:
      - https://mediasuite.clariah.nl/documentation/faq/who-develops
    notes: "\"Who is leading\" fails (vocabulary gap: leading vs develops); using more direct phrasing"

  - question: "who funded the Media Suite?"
    category: gap
    notes: "should at some point say something like NWO via CLARIAH, for example in Large Scale Research Infrastructure (LSRI) projects."

  - question: "Give me a list of researchers that worked with the Media Suite"
    category: gap

  - question: "What does the Reflexibity Tool do?"
    category: gap

  - question: "Can you tell me morte about the metadata of the NISV collection?"
    category: partial
    expected_urls:
      - https://mediasuite.clariah.nl/documentation/faq/what-data
      - https://data.beeldengeluid.nl/apis/nisv-media-catalog

  - question: "How do I query the NISV media catalog with SPARQL?"
    category: answerable
    expected_urls:
      - https://data.beeldengeluid.nl/apis/nisv-media-catalog
      - https://mediasuite.clariah.nl/learn/tool-tutorials/tutorial-searching-and-exploring-with-linked-data-and-wikidata-in-the-media-suite

  - question: "What does the MOZ collection contain?"
    category: answerable
    expected_urls:
      - https://data.beeldengeluid.nl/datasets/muziekopnamen-zendgemachtigden

  - question: "What is the difference between Open Beelden and Open Beelden op Europeana Sounds?"
    category: gap

  - question: "What open data license does Sound & Vision use?"
    category: partial
    expected_urls:
      - https://data.beeldengeluid.nl/datasets/open-beelden

  - question: "What is the GTAA?"
    category: partial
    expected_urls:
      - https://data.beeldengeluid.nl/datasets/gtaa
    notes: "Short 'What is X?' questions embed close to tutorial introductions rather than reference docs; GTAA page ranks ~18th. Known retrieval gap — revisit if re-ranking or metadata filtering is added."

  # ── Research publications ──────────────────────────────────────────────────

  - question: "How has the Media Suite been used for automatic enrichment of audiovisual collections?"
    category: answerable
    expected_urls:
      - https://www.scitepress.org/PublicationsDetail.aspx?ID=DgZjO6HYYTA=&t=1
    notes: Automatic Annotations conference paper ranks #2 for this query

  - question: "How has Media Suite research been used to study wartime radio propaganda?"
    category: answerable
    expected_urls:
      - https://doi.org/10.18146/tmg.821
    notes: Traces of a Media War — WWII Dutch-language broadcasts study, ranks #1

  - question: "What is known about using the Media Suite to study propaganda in Dutch media?"
    category: answerable
    expected_urls:
      - https://doi.org/10.18146/view.306
    notes: Audio on Paper — WWII Dutch media propaganda study

  - question: "How have researchers used the Media Suite for developing data stories?"
    category: answerable
    expected_urls:
      - https://doi.org/10.5281/zenodo.7501190
    notes: Developing Data Stories paper ranks #1 for this query

  - question: "How have researchers used the Media Suite for video annotation research?"
    category: answerable
    expected_urls:
      - https://www.uni-marburg.de/en/fb09/institutes/media-studies/research/research-projects/digitalfilmhistoriography/events/conference_program
    notes: Visions of a Timeline — tool-critical perspective on Media Suite video annotation, ranks #4

  - question: "How was the Media Suite used to study WWII eyewitness testimonies?"
    category: answerable
    expected_urls:
      - https://doi.org/10.18146/tmg.810
    notes: CrossEWT — supplementary paper (not in Zotero group, added via supplementary_dois)

  - question: "Has the Media Suite been used to analyze public debate in Dutch media?"
    category: partial
    expected_urls:
      - https://dspace.library.uu.nl/handle/1874/385019
      - https://mediasuite.clariah.nl/learn/example-projects/debate-research-across-media-cross-media-research-of-public-debates-on-drugs-and-regulation-dream
    notes: Operationalizing public debates paper has no DOI so cannot be fetched via supplementary_dois; example project page is an acceptable fallback

  - question: "How have researchers used the Media Suite to annotate film archive collections?"
    category: answerable
    expected_urls:
      - https://doi.org/10.18146/tmg.811
    notes: MIMEHIST — supplementary paper (not in Zotero group, added via supplementary_dois)
