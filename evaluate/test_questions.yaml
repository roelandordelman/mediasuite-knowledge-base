  - question: "Which services exist for enriching the Sound & Vision collection? Can I ask for enrichment on-demand?"
    category: structural
    expected_answer: "Automatic enrichment services include the ASR Service (speech recognition for broadcast content) and the Visual Similarity Service / VisXP (keyframe extraction). On-demand enrichment is not yet supported — 'Researcher-triggered enrichment on demand' is an aspirational workflow."
    notes: "Two-part question. SPARQL: services_by_tool for enrichment services + all_workflows filtered by Aspirational for ms:OnDemandEnrichmentWorkflow."

