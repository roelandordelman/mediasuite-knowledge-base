  # ── Access and authentication ─────────────────────────────────────────────

  - question: "Which collections can I use without needing to log in?"
    category: structural
    expected_answer: "Open Beelden (CC0), Open Beelden Natuurbeelden (CC0), Radio Oranje (Public Domain), DANS Oral History Archive (open), Tweede Kamer Archive (public)"
    notes: "Variant of 'Which collections can I access without logging in?' — researcher-oriented phrasing. SPARQL: open_collections."

  - question: "What can I do in the Media Suite without a login?"
    category: structural
    expected_answer: "Without logging in you can browse Open Beelden, Open Beelden Natuurbeelden, Radio Oranje, DANS Oral History Archive, and the Tweede Kamer Archive. Personal features — Workspace, Annotation Tool, saving projects — require a login."
    notes: "Broader than the open_collections query: also asks about functionality scope. SPARQL: open_collections + entity graph for tool requirements."

  - question: "What can I do in the Media Suite without a SURFconext account?"
    category: structural
    expected_answer: "Without a SURFconext account you can access the five PUBLIC collections (Open Beelden, Open Beelden Natuurbeelden, Radio Oranje, DANS Oral History Archive, Tweede Kamer Archive). Restricted collections (Sound & Vision, EYE, KB, etc.) and personal tools (Workspace, Annotation Tool) require SURFconext or equivalent institutional login."
    notes: "Extends the open-access question to cover identity provider context. SPARQL: open_collections + collections_by_access."

  - question: "Which collections can I use only as a researcher working at a university?"
    category: structural
    expected_answer: "RESTRICTED (institutional access required): Sound & Vision Archive, Sound & Vision Television Archive, Sound & Vision Radio Archive, NISV Art Collection, Amateur Film Collection, Dutch Program Guides, Kijk & Luistercijfers, EYE Film Collection. NON_PUBLIC (special arrangement): KB Newspaper Collection, Meertens Soundbites Collection."
    notes: "SPARQL: collections_by_access filtering for euright:RESTRICTED and euright:NON_PUBLIC. Vector search cannot enumerate all restricted collections reliably."

  # ── Licenses and reuse ────────────────────────────────────────────────────

  - question: "Which collections have a Creative Commons license?"
    category: structural
    expected_answer: "Open Beelden (CC0 1.0), Open Beelden Natuurbeelden (CC0 1.0), Radio Oranje (Public Domain Mark 1.0 — a CC tool). Other PUBLIC collections (DANS Oral History Archive, Tweede Kamer Archive) are openly accessible but their license conditions are not documented in the collection registry."
    notes: "SPARQL: collections_by_access filtering for dcterms:license URIs containing creativecommons.org."

  - question: "Which collections in the Media Suite have a CC0 license?"
    category: structural
    expected_answer: "Open Beelden and Open Beelden Natuurbeelden — both carry CC0 1.0 (Creative Commons Zero), meaning content and metadata are freely reusable with no attribution required."
    notes: "SPARQL: collections_by_access filtering for dcterms:license = creativecommons.org/publicdomain/zero/1.0/. Radio Oranje uses Public Domain Mark, not CC0."

  - question: "Can I use Radio Oranje data without restrictions?"
    category: structural
    expected_answer: "Yes — Radio Oranje is in the Public Domain under Dutch law (Public Domain Mark 1.0), so there are no copyright or reuse restrictions."
    notes: "Variant of 'Can I use Radio Oranje data commercially?' with access/restrictions framing. SPARQL: dcterms:license for ms:RadioOranje."

