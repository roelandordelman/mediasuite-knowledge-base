  # ── Collections, APIs, and enrichment ────────────────────────────────────

  - question: "Which collections can I access via the Open Images API?"
    category: structural
    expected_answer: "The Open Images API (openimages.eu/api) serves the Open Beelden collection — open access audiovisual content from the Sound & Vision archive. It enables programmatic, Jupyter-based quantitative analysis without authentication restrictions."
    notes: "SPARQL: datasets_by_service on ms:OpenImagesAPI (dcat:servesDataset relationship). Vector search fails: the chunk text describes OAI-PMH harvesting and creative reuse, not collection access — vocabulary mismatch confirmed in eval. Structural path works correctly via entity_uri filter on the apis/open-images chunk."

  - question: "Is there a SPARQL endpoint for the Sound & Vision catalog?"
